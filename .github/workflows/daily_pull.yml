name: Daily Data Pull / App Deployment

permissions:
  contents: read

on:
  schedule:
    - cron: "0 19 * * *"   # 11am PST
  workflow_dispatch:

jobs:
  run-vald:
    runs-on: ubuntu-22.04

    env:
      RENV_CONFIG_REPOS_OVERRIDE: https://packagemanager.posit.co/cran/__linux__/jammy/latest
      R_BUILD_VIGNETTES: false
      R_CHECK_BUILD_VIGNETTES: false
      DATA_OUTPUT_DIR: data-repo/data

    outputs:
      data_changed: ${{ steps.check_changes.outputs.data_changed }}

    steps:
      # Checkout PUBLIC repo (code only)
      - name: Checkout code repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'

      - name: Restore renv environment
        uses: r-lib/actions/setup-renv@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Checkout PRIVATE data repo
      - name: Checkout private data repo
        uses: actions/checkout@v4
        with:
          repository: tylerrchia/UCLA-Football-Strength-App-DATA
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data-repo

      # Snapshot RDS checksums BEFORE the pull
      - name: Snapshot RDS checksums before pull
        run: |
          find data-repo/data -name "*.rds" | sort | xargs md5sum 2>/dev/null > /tmp/rds_before.txt || touch /tmp/rds_before.txt

      - name: Run VALD data pull
        env:
          VALD_CLIENT_ID: ${{ secrets.VALD_CLIENT_ID }}
          VALD_CLIENT_SECRET: ${{ secrets.VALD_CLIENT_SECRET }}
          VALD_TENANT_ID: ${{ secrets.VALD_TENANT_ID }}
          VALD_REGION: ${{ secrets.VALD_REGION }}
        run: Rscript scripts/vald_import.R

      - name: Run Catapult data pull
        env:
          CATAPULT_API_TOKEN: ${{ secrets.CATAPULT_API_TOKEN }}
        run: Rscript scripts/catapult_import.R

      - name: Run SmartSpeed data pull
        env:
          VALD_CLIENT_ID: ${{ secrets.VALD_CLIENT_ID }}
          VALD_CLIENT_SECRET: ${{ secrets.VALD_CLIENT_SECRET }}
          VALD_TENANT_ID: ${{ secrets.VALD_TENANT_ID }}
          DATA_OUTPUT_DIR: ${{ env.DATA_OUTPUT_DIR }}
        run: python scripts/smartspeed_import.py

      - name: Pull manual Google Sheet data
        env:
          GOOGLE_SHEETS_CSV: ${{ secrets.GOOGLE_SHEETS_CSV }}
        run: Rscript scripts/manual_pull.R

      - name: Convert CSVs to RDS
        run: Rscript scripts/csv_to_rds.R

      # Snapshot RDS checksums AFTER the pull and compare
      - name: Check if any RDS files changed
        id: check_changes
        run: |
          find data-repo/data -name "*.rds" | sort | xargs md5sum 2>/dev/null > /tmp/rds_after.txt || touch /tmp/rds_after.txt
          if diff -q /tmp/rds_before.txt /tmp/rds_after.txt > /dev/null 2>&1; then
            echo "data_changed=false" >> $GITHUB_OUTPUT
            echo "No RDS changes detected — skipping deploy."
          else
            echo "data_changed=true" >> $GITHUB_OUTPUT
            echo "RDS changes detected — deploy will run."
          fi

      # Commit ONLY to the private repo
      - name: Commit and push data to private repo
        run: |
          cd data-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data
          git commit -m "Daily VALD & Catapult data update" || echo "No changes"
          git push

  deploy:
    needs: run-vald
    if: needs.run-vald.outputs.data_changed == 'true'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Checkout private data repo
        uses: actions/checkout@v4
        with:
          repository: tylerrchia/UCLA-Football-Strength-App-DATA
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data-repo

      - name: Copy data and images into app/
        run: |
          mkdir -p app/data
          cp data-repo/data/*.rds app/data/

          # Copy headshots and body comp photos into app/www/ so Shiny serves them
          if [ -d "data-repo/images/HEADSHOTS" ]; then
            mkdir -p app/www/HEADSHOTS
            cp -r data-repo/images/HEADSHOTS/. app/www/HEADSHOTS/
          fi
          if [ -d "data-repo/images/pics" ]; then
            mkdir -p app/www/pics
            cp -r data-repo/images/pics/. app/www/pics/
          fi

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'

      - name: Restore renv
        uses: r-lib/actions/setup-renv@v2

      - name: Install rsconnect
        run: R -e 'install.packages("rsconnect")'

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN:   ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET:  ${{ secrets.SHINYAPPS_SECRET }}
          SHINYAPPS_APPNAME: ${{ secrets.SHINYAPPS_APPNAME }}
        run: |
          R -e '
            rsconnect::setAccountInfo(
              name   = Sys.getenv("SHINYAPPS_ACCOUNT"),
              token  = Sys.getenv("SHINYAPPS_TOKEN"),
              secret = Sys.getenv("SHINYAPPS_SECRET")
            )
            rsconnect::deployApp(
              appDir        = "app",
              appPrimaryDoc = "app_automated.r",
              appName       = Sys.getenv("SHINYAPPS_APPNAME"),
              forceUpdate   = TRUE,
              launch.browser = FALSE
            )
          '
